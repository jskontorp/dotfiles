name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck install.sh init.sh machine/mac/bootstrap.sh machine/vm/bootstrap.sh test/verify.sh test/validate-manifest.sh test/check-justfile.sh

  justfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: justfile checks
        run: bash test/check-justfile.sh

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./test/verify.sh both
